<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reverse Galaga</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 3/4;
            max-height: 100vh;
        }
        canvas {
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: block;
            image-rendering: pixelated;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            box-sizing: border-box;
            pointer-events: none;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }
        .btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            user-select: none;
            touch-action: none;
        }
        .btn:active {
            background: rgba(255, 255, 255, 0.4);
        }
        #action-btn {
            border-radius: 15px;
            width: 100px;
            font-size: 16px;
            font-weight: bold;
            pointer-events: auto;
        }
        #message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
            width: 100%;
        }
        /* Hide controls on larger screens with keyboards */
        @media (min-width: 768px) {
            #controls { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="600" height="800"></canvas>
    <div id="message-overlay"></div>
    <div id="controls">
        <div class="btn-group">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
        <div class="btn" id="action-btn">ACTION</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgOverlay = document.getElementById('message-overlay');

    // Input state
    const input = { left: false, right: false, action: false };

    // Bind Keyboard
    window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft') input.left = true;
        if (e.code === 'ArrowRight') input.right = true;
        if (e.code === 'Space' || e.code === 'KeyZ') input.action = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft') input.left = false;
        if (e.code === 'ArrowRight') input.right = false;
        if (e.code === 'Space' || e.code === 'KeyZ') input.action = false;
    });

    // Bind Touch
    const bindTouch = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; });
        el.addEventListener('touchend', (e) => { e.preventDefault(); input[key] = false; });
    };
    bindTouch('btn-left', 'left');
    bindTouch('btn-right', 'right');
    bindTouch('action-btn', 'action');

    // Game Entities
    let player, hero, bullets, gameState, actionCooldown;

    function initGame() {
        gameState = "PLAYING";
        msgOverlay.innerText = "";
        actionCooldown = 0;

        player = {
            x: 100, y: 100, w: 40, h: 30,
            formX: 100, formY: 100,
            state: "FORMATION", // FORMATION, DIVING
            baseX: 100, diveSpeed: 4, timeInDive: 0
        };

        hero = {
            x: canvas.width / 2, y: canvas.height - 70, w: 30, h: 40,
            speed: 3, dir: 1, shootTimer: Math.random() * 60 + 30
        };

        bullets = [];
    }

    function rectIntersect(r1, r2) {
        return !(r2.x > r1.x + r1.w || 
                 r2.x + r2.w < r1.x || 
                 r2.y > r1.y + r1.h ||
                 r2.y + r2.h < r1.y);
    }

    function update() {
        if (gameState !== "PLAYING") {
            if (input.action && actionCooldown <= 0) initGame();
            if (actionCooldown > 0) actionCooldown--;
            return;
        }

        // Action Cooldown
        if (actionCooldown > 0) actionCooldown--;

        // --- Player (Boss) Logic ---
        if (player.state === "FORMATION") {
            player.y = player.formY + Math.sin(Date.now() * 0.005) * 5;
            player.x = player.formX;
            
            if (input.action && actionCooldown <= 0) {
                player.state = "DIVING";
                player.timeInDive = 0;
                player.baseX = player.x;
                actionCooldown = 15; // Debounce touch
            }
        } else if (player.state === "DIVING") {
            player.timeInDive++;
            player.y += player.diveSpeed;

            // The swooping sine wave
            let autoSwerve = Math.sin(player.timeInDive * 0.05) * 80;

            // Player steering influence
            if (input.left) player.baseX -= 4;
            if (input.right) player.baseX += 4;

            // Clamp base
            player.baseX = Math.max(20, Math.min(canvas.width - 20 - player.w, player.baseX));
            player.x = player.baseX + autoSwerve;

            // Shoot
            if (input.action && actionCooldown <= 0) {
                bullets.push({ x: player.x + player.w/2 - 2, y: player.y + player.h, w: 4, h: 10, dy: 7, isAlien: true });
                actionCooldown = 30; // 0.5 sec cooldown
            }

            // Reset if off bottom
            if (player.y > canvas.height) {
                player.state = "FORMATION";
                player.x = player.formX;
                player.y = player.formY;
            }
        }

        // --- Hero (AI) Logic ---
        hero.x += hero.speed * hero.dir;
        if (hero.x + hero.w > canvas.width - 20 || hero.x < 20) hero.dir *= -1;
        if (Math.random() < 0.02) hero.dir *= -1; // Panic moves

        hero.shootTimer--;
        if (hero.shootTimer <= 0) {
            bullets.push({ x: hero.x + hero.w/2 - 2, y: hero.y, w: 4, h: 10, dy: -7, isAlien: false });
            hero.shootTimer = Math.random() * 60 + 30;
        }

        // --- Bullets Logic ---
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.y += b.dy;
            if (b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
        }

        // --- Collisions ---
        // 1. Kamikaze
        if (rectIntersect(player, hero)) {
            endGame("CRASH!\nYou destroyed the Hero!");
        }

        // 2. Bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            if (b.isAlien && rectIntersect(b, hero)) {
                endGame("SHOT!\nYou destroyed the Hero!");
                break;
            } else if (!b.isAlien && rectIntersect(b, player)) {
                endGame("GAME OVER\nThe Hero shot you.");
                break;
            }
        }
    }

    function endGame(msg) {
        gameState = "GAMEOVER";
        msgOverlay.innerText = msg + "\n\n(Tap Action to Restart)";
        actionCooldown = 60; // Prevent instant restart
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Player (Red)
        ctx.fillStyle = "#ff3232";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Draw Hero (Blue)
        if (gameState === "PLAYING" || msgOverlay.innerText.includes("GAME OVER")) {
            ctx.fillStyle = "#3296ff";
            ctx.fillRect(hero.x, hero.y, hero.w, hero.h);
        }

        // Draw Bullets
        for (let b of bullets) {
            ctx.fillStyle = b.isAlien ? "#ffff00" : "#ffffff";
            ctx.fillRect(b.x, b.y, b.w, b.h);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    initGame();
    loop();
</script>
</body>
</html>
