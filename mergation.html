<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mergation - 3D Shuffleboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        #game-over, #win-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 10, 5, 0.98);
            padding: 3rem;
            border-radius: 1.5rem;
            color: white;
            text-align: center;
            display: none;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9);
            z-index: 100;
            min-width: 300px;
        }
        #game-over { border: 3px solid #d97706; }
        #win-screen { border: 3px solid #10b981; }
        .btn {
            background: #d97706;
            color: white;
            font-weight: 900;
            padding: 1rem 3.5rem;
            border-radius: 9999px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            pointer-events: auto;
            margin-top: 1rem;
            display: inline-block;
        }
        .btn:hover { transform: scale(1.1); background: #f59e0b; }
    </style>
</head>
<body>

<div id="ui">
    <h1 class="text-4xl font-black italic tracking-tighter text-amber-500">MERGATION</h1>
    <p class="text-xl font-bold opacity-90">Score: <span id="score">0</span></p>
</div>

<div id="game-over">
    <h2 class="text-5xl font-black mb-4 text-amber-600">GAME OVER</h2>
    <p class="text-2xl mb-4" id="game-over-reason">LINE CROSSED</p>
    <p class="text-xl mb-6">Final Score: <span id="final-score-over">0</span></p>
    <button id="retry-btn-over" class="btn">RETRY</button>
</div>

<div id="win-screen">
    <h2 class="text-5xl font-black mb-4 text-emerald-500">ULTIMATE MERGATION!</h2>
    <p class="text-2xl mb-4">You achieved 2048</p>
    <p class="text-xl mb-6">Final Score: <span id="final-score-win">0</span></p>
    <button id="retry-btn-win" class="btn" style="background: #10b981;">CELEBRATE AGAIN</button>
</div>

<script>
    const COLORS = [
        0xff3b3b, 0xff9f43, 0xfeca57, 0x1dd1a1, 0x54a0ff, 
        0x5f27cd, 0xee5253, 0x0abde3, 0x10ac84, 0xf1f2f6, 0x2f3542
    ];

    function getColorForValue(val) {
        const index = Math.max(0, Math.floor(Math.log2(val)) - 1);
        return COLORS[index % COLORS.length];
    }

    let scene, camera, renderer, cubes = [], activeCube = null;
    let score = 0, isGameOver = false, isMouseDown = false;
    const worldWidth = 7, worldDepth = 26, cubeSize = 1.1, deadLineZ = 10.5; 
    const slopeGravity = 0.0075, verticalGravity = 0.045; 
    const supportOverlapThreshold = 0.55;
    const overlapEpsilon = 0.001;
    const overlapHorizontalNudge = 0.02;
    const visibleAngularVelocityThreshold = 0.02;
    const visibleSpeedThreshold = 0.06;
    const visibleVerticalVelocityThreshold = 0.04;
    const visibleHeightThreshold = cubeSize/2 + 0.2;
    let effects = [], fireworks = [];
    let lastVisibleMotionTime = performance.now();
    const stalledSpawnDelayMs = 2500;

    function createWoodTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 1024;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#3d2410'; ctx.fillRect(0, 0, 512, 1024);
        for (let i = 0; i < 350; i++) {
            ctx.strokeStyle = `rgba(20, 10, 5, ${Math.random() * 0.5})`;
            ctx.lineWidth = 1 + Math.random() * 5;
            const x = Math.random() * 512;
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + (Math.random()-0.5)*40, 1024); ctx.stroke();
        }
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.lineWidth = 3;
        [150, 350, 550, 750, 950].forEach(y => { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(512, y); ctx.stroke(); });
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
        return texture;
    }

    function createFirework(x, y, z) {
        const particles = new THREE.Group();
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        for (let i = 0; i < 60; i++) {
            const p = new THREE.Mesh(new THREE.SphereGeometry(0.15, 4, 4), new THREE.MeshBasicMaterial({ color }));
            p.userData.velocity = new THREE.Vector3((Math.random()-0.5)*0.7, (Math.random()-0.1)*0.8, (Math.random()-0.5)*0.7);
            particles.add(p);
        }
        particles.position.set(x, y, z); scene.add(particles);
        fireworks.push({ group: particles, life: 1.0, update() {
            this.life -= 0.01;
            this.group.children.forEach(p => { p.position.add(p.userData.velocity); p.userData.velocity.y -= 0.012; p.scale.multiplyScalar(0.97); });
            if (this.life <= 0) { scene.remove(this.group); return false; } return true;
        }});
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030201);
        camera = new THREE.PerspectiveCamera(38, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 28, 30); camera.lookAt(0, 0, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffe0b2, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
        dirLight.position.set(5, 30, 15); dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(2048, 2048);
        dirLight.shadow.camera.left = -15; dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 25; dirLight.shadow.camera.bottom = -25;
        scene.add(dirLight);

        const slopeGroup = new THREE.Group(); slopeGroup.rotation.x = 0.015; scene.add(slopeGroup);
        const board = new THREE.Mesh(new THREE.BoxGeometry(worldWidth, 0.5, worldDepth), new THREE.MeshPhongMaterial({ map: createWoodTexture(), shininess: 100, specular: 0x666666 }));
        board.position.y = -0.25; board.receiveShadow = true; slopeGroup.add(board);

        [-(worldWidth/2 + 0.5), (worldWidth/2 + 0.5)].forEach(x => {
            const side = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, worldDepth), new THREE.MeshPhongMaterial({ color: 0x080808 }));
            side.position.set(x, 0, 0); side.receiveShadow = true; slopeGroup.add(side);
        });

        const wall = new THREE.Mesh(new THREE.BoxGeometry(worldWidth+2, 3.5, 0.5), new THREE.MeshPhongMaterial({ color: 0x120e06 }));
        wall.position.set(0, 1.5, -(worldDepth/2 + 0.25)); wall.castShadow = wall.receiveShadow = true; slopeGroup.add(wall);

        const line = new THREE.Mesh(new THREE.BoxGeometry(worldWidth, 0.05, 0.2), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        line.position.set(0, 0.03, deadLineZ); slopeGroup.add(line);

        scene.slopeGroup = slopeGroup;
        spawnShooter();

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onRelease);
        window.addEventListener('touchstart', (e) => { isMouseDown = true; }, {passive: true});
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('touchend', onRelease);

        const reload = () => window.location.reload();
        document.getElementById('retry-btn-over').onclick = reload;
        document.getElementById('retry-btn-win').onclick = reload;
        animate();
    }

    function createCube(value, x, z, y = cubeSize/2) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const color = getColorForValue(value);
        ctx.fillStyle = '#' + color.toString(16).padStart(6, '0'); ctx.fillRect(0, 0, 256, 256);
        ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 24; ctx.strokeRect(0, 0, 256, 256);
        ctx.fillStyle = (value === 1024 || value === 8 || value === 4 || color === 0xf1f2f6) ? '#000' : '#fff';
        ctx.font = 'bold 125px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 12; ctx.fillText(value, 128, 128);
        const cube = new THREE.Mesh(new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize), new THREE.MeshPhongMaterial({ map: new THREE.CanvasTexture(canvas), shininess: 70 }));
        cube.castShadow = cube.receiveShadow = true; cube.position.set(x, y, z);
        cube.userData = { value, velocity: new THREE.Vector3(), angularVelocity: new THREE.Vector3() };
        return cube;
    }

    function createPopRing(pos, color) {
        const ring = new THREE.Mesh(new THREE.TorusGeometry(cubeSize*0.6, 0.08, 12, 32), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1.0 }));
        ring.position.copy(pos); ring.rotation.x = Math.PI/2; scene.slopeGroup.add(ring);
        effects.push({ mesh: ring, life: 1.0, update() {
            this.life -= 0.035; this.mesh.scale.addScalar(0.32); this.mesh.material.opacity = this.life;
            if (this.life <= 0) { scene.slopeGroup.remove(this.mesh); return false; } return true;
        }});
    }

    function spawnShooter() {
        if (isGameOver) return;
        activeCube = createCube([2, 4, 8, 16, 32][Math.floor(Math.random()*5)], 0, worldDepth/2 - 1.5);
        scene.slopeGroup.add(activeCube);
    }

    function onMove(e) {
        if (!activeCube || isGameOver) return;
        const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        const x = ((clientX / window.innerWidth) * 2 - 1) * (worldWidth / 2);
        activeCube.position.x = Math.max(-worldWidth/2 + 0.6, Math.min(worldWidth/2 - 0.6, x));
    }

    function onRelease() {
        if (!isMouseDown || !activeCube) return;
        isMouseDown = false; activeCube.userData.velocity.z = -1.4;
        cubes.push(activeCube); activeCube = null;
    }

    function hasVisibleCubeMotion(cube, speed) {
        return speed > visibleSpeedThreshold || Math.abs(cube.userData.velocity.y) > visibleVerticalVelocityThreshold || cube.position.y > visibleHeightThreshold;
    }

    function shouldSpawnShooter(boardIsActive, isStalled) {
        return (!boardIsActive || isStalled) && !activeCube && !isGameOver && effects.length === 0;
    }

    function animate() {
        requestAnimationFrame(animate);
        let boardIsActive = false;
        let visibleMotion = false;
        effects = effects.filter(eff => eff.update());
        fireworks = fireworks.filter(fw => fw.update());
        if (isGameOver) { renderer.render(scene, camera); return; }

        for (let i = cubes.length - 1; i >= 0; i--) {
            const cube = cubes[i]; if (!cube.parent) continue;
            resolveSolidOverlap(cube);

            // Hanging / Stack Gravity
            const support = checkSupport(cube);
            if (!support && cube.position.y > cubeSize/2 + 0.05) {
                cube.userData.velocity.y -= verticalGravity;
                boardIsActive = true;
            } else if (support && cube.userData.velocity.y < 0) {
                cube.userData.velocity.y = 0;
                cube.position.y = support.position.y + cubeSize;
            } else if (cube.position.y <= cubeSize/2) {
                cube.position.y = cubeSize/2;
                if (cube.userData.velocity.y < 0) cube.userData.velocity.y = 0;
            }

            // Twist Physics
            if (cube.userData.angularVelocity.length() > 0.001) {
                cube.rotation.x += cube.userData.angularVelocity.x;
                cube.rotation.y += cube.userData.angularVelocity.y;
                cube.rotation.z += cube.userData.angularVelocity.z;
                cube.userData.angularVelocity.multiplyScalar(0.95);
                boardIsActive = true;
                if (cube.userData.angularVelocity.length() > visibleAngularVelocityThreshold) visibleMotion = true;
            }

            const speed = cube.userData.velocity.length();
            // If it's moving OR it's in the air, mark board as active
            if (speed > 0.01 || cube.position.y > cubeSize/2 + 0.05) {
                boardIsActive = true; 
                cube.userData.velocity.z -= slopeGravity; // Downhill force
                cube.position.add(cube.userData.velocity);
                resolveSolidOverlap(cube);
                cube.userData.velocity.multiplyScalar(0.972); // Slightly more slippery
                if (hasVisibleCubeMotion(cube, speed)) visibleMotion = true;

                if (speed < 0.02 && cube.position.y <= cubeSize/2 + 0.05) { stopCube(cube); }
                
                // Sliding Far Wall
                if (cube.position.z < -worldDepth/2 + 0.5) {
                    cube.position.z = -worldDepth/2 + 0.5;
                    if (cube.userData.velocity.z < 0) cube.userData.velocity.z = 0;
                }
                
                // Lose conditions
                if (cube.position.z > worldDepth/2 + 1.8 || Math.abs(cube.position.x) > worldWidth/2 + 1.2) { 
                    endGame("FELL OFF THE BOARD!"); 
                }
                if (cube.position.z > deadLineZ + 0.2 && speed < 0.05 && cube.position.y <= cubeSize/2 + 0.1) { 
                    endGame("CROSSED THE LINE!"); 
                }

                // Side Bounces
                if (Math.abs(cube.position.x) > worldWidth/2 - 0.55) {
                    cube.position.x = Math.sign(cube.position.x) * (worldWidth/2 - 0.55);
                    cube.userData.velocity.x *= -0.5;
                }

                // Collisions
                for (let other of cubes) {
                    if (other === cube || !other.parent) continue;
                    const threshold = (cube.userData.value === other.userData.value) ? cubeSize * 1.18 : cubeSize * 0.98;
                    if (cube.position.distanceTo(other.position) < threshold) { handleCollision(cube, other); break; }
                }
            }
        }

        const now = performance.now();
        if (visibleMotion || activeCube || effects.length > 0) lastVisibleMotionTime = now;
        const isStalled = now - lastVisibleMotionTime >= stalledSpawnDelayMs;
        if (shouldSpawnShooter(boardIsActive, isStalled)) spawnShooter();
        renderer.render(scene, camera);
    }

    function checkSupport(cube) {
        for (let other of cubes) {
            if (other === cube || !other.parent) continue;
            const xOverlap = cubeSize - Math.abs(cube.position.x - other.position.x);
            const zOverlap = cubeSize - Math.abs(cube.position.z - other.position.z);
            const yDelta = cube.position.y - (other.position.y + cubeSize);
            // Must have meaningful top overlap to be considered stable support
            if (xOverlap > cubeSize * supportOverlapThreshold && zOverlap > cubeSize * supportOverlapThreshold && yDelta > -0.25 && yDelta < 0.45) return other;
        }
        return null;
    }

    function resolveSolidOverlap(cube) {
        for (let other of cubes) {
            if (other === cube || !other.parent) continue;
            const dx = cube.position.x - other.position.x;
            const dy = cube.position.y - other.position.y;
            const dz = cube.position.z - other.position.z;
            const overlapX = cubeSize - Math.abs(dx);
            const overlapY = cubeSize - Math.abs(dy);
            const overlapZ = cubeSize - Math.abs(dz);
            if (overlapX <= 0 || overlapY <= 0 || overlapZ <= 0) continue;

            if (overlapY <= overlapX && overlapY <= overlapZ) {
                const dirY = dy >= 0 ? 1 : -1;
                cube.position.y += dirY * (overlapY + overlapEpsilon);
                if ((dirY > 0 && cube.userData.velocity.y < 0) || (dirY < 0 && cube.userData.velocity.y > 0)) cube.userData.velocity.y = 0;
            } else if (overlapX <= overlapZ) {
                const dirX = dx >= 0 ? 1 : -1;
                cube.position.x += dirX * (overlapX + overlapEpsilon);
                cube.userData.velocity.x += dirX * overlapHorizontalNudge;
            } else {
                const dirZ = dz >= 0 ? 1 : -1;
                cube.position.z += dirZ * (overlapZ + overlapEpsilon);
                cube.userData.velocity.z += dirZ * overlapHorizontalNudge;
            }
        }
    }

    function handleCollision(moving, other) {
        if (moving.userData.value === other.userData.value) performMerge(moving, other);
        else {
            const collisionVec = new THREE.Vector3().subVectors(other.position, moving.position).normalize();
            const relVel = moving.userData.velocity.length();
            other.userData.velocity.add(collisionVec.clone().multiplyScalar(relVel * 0.82));
            const bounceVec = new THREE.Vector3().subVectors(moving.position, other.position).normalize();
            moving.userData.velocity.copy(bounceVec.multiplyScalar(relVel * 0.28));
            const minMove = (cubeSize - moving.position.distanceTo(other.position)) / 2;
            moving.position.add(bounceVec.multiplyScalar(minMove)); other.position.add(collisionVec.multiplyScalar(minMove));
            popCube(moving); popCube(other);
        }
    }

    function popCube(cube) {
        cube.scale.set(1.3, 1.3, 1.3);
        let s = 0.15;
        const iv = setInterval(() => {
            if (!cube.parent) { clearInterval(iv); return; }
            cube.scale.lerp(new THREE.Vector3(1,1,1), s); s += 0.05;
            if (cube.scale.x <= 1.01) { cube.scale.set(1,1,1); clearInterval(iv); }
        }, 16);
    }

    function performMerge(target, source) {
        const val = target.userData.value * 2; score += val; document.getElementById('score').innerText = score;
        const pos = source.position.clone(); createPopRing(pos, getColorForValue(val));
        scene.slopeGroup.remove(source); scene.slopeGroup.remove(target);
        cubes = cubes.filter(c => c !== source && c !== target);
        const upgraded = createCube(val, pos.x, pos.z, pos.y); scene.slopeGroup.add(upgraded);
        // Launch uphill with twist
        upgraded.userData.velocity.set((Math.random()-0.5)*0.5, 1.1, -1.3); 
        upgraded.userData.angularVelocity.set((Math.random()-0.5)*0.7, (Math.random()-0.5)*0.7, (Math.random()-0.5)*0.7);
        cubes.push(upgraded); 
        upgraded.scale.set(2.8, 2.8, 2.8);
        let spring = 0.1; const shrink = setInterval(() => {
            if (!upgraded.parent) { clearInterval(shrink); return; }
            upgraded.scale.lerp(new THREE.Vector3(1,1,1), spring); spring += 0.02;
            if (upgraded.scale.x <= 1.05) { upgraded.scale.set(1,1,1); clearInterval(shrink); }
        }, 16);
        if (val === 2048) triggerWin();
    }

    function triggerWin() {
        document.getElementById('win-screen').style.display = 'block'; document.getElementById('final-score-win').innerText = score;
        for (let i = 0; i < 20; i++) setTimeout(() => createFirework((Math.random()-0.5)*worldWidth, 8+Math.random()*8, (Math.random()-0.5)*worldDepth), i*300);
    }

    function stopCube(c) { c.userData.velocity.set(0,0,0); c.userData.angularVelocity.set(0,0,0); c.rotation.set(0,0,0); }
    function endGame(r) { if (isGameOver) return; isGameOver = true; document.getElementById('game-over').style.display = 'block'; document.getElementById('game-over-reason').innerText = r; document.getElementById('final-score-over').innerText = score; }
    function onWindowResize() { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    
    init();
</script>
</body>
</html>

    <h2 class="text-5xl font-black mb-4 text-emerald-500">ULTIMATE MERGATION!</h2>

    <p class="text-xl mb-8">Final Score: <span id="final-score-win">0</span></p>
    <button onclick="location.reload()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 px-12 rounded-full transition-all transform hover:scale-110 active:scale-95 pointer-events-auto shadow-lg">

    </button>

<script>
    const COLORS = [
        0xff3b3b, 0xff9f43, 0xfeca57, 0x1dd1a1, 0x54a0ff, 
        0x5f27cd, 0xee5253, 0x0abde3, 0x10ac84, 0xf1f2f6, 0x2f3542
    ];

    function getColorForValue(val) {
        const index = Math.max(0, Math.floor(Math.log2(val)) - 1);
        return COLORS[index % COLORS.length];
    }

    let scene, camera, renderer, cubes = [], activeCube = null;
    let score = 0;
    let isGameOver = false;
    let isMouseDown = false;
    const worldWidth = 7; 
    const worldDepth = 26; 
    const cubeSize = 1.1;
    const deadLineZ = 9.5; 
    const slopeGravity = 0.007; 
    const verticalGravity = 0.035; 
    const supportOverlapThreshold = 0.55;
    const overlapEpsilon = 0.001;
    const overlapHorizontalNudge = 0.02;

    let effects = [];
    let fireworks = [];

    function createWoodTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 1024;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#633c1e';
        ctx.fillRect(0, 0, 512, 1024);
        for (let i = 0; i < 200; i++) {
            ctx.strokeStyle = `rgba(50, 30, 10, ${Math.random() * 0.3})`;
            ctx.lineWidth = 1 + Math.random() * 3;
            const x = Math.random() * 512;
            ctx.beginPath();
            ctx.moveTo(x, 0); ctx.lineTo(x + (Math.random() - 0.5) * 20, 1024);
            ctx.stroke();
        }
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 2;
        for (let x = 0; x < 512; x += 64) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 1024); ctx.stroke();
        }
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.lineWidth = 8;
        [100, 300, 500, 700, 900].forEach(y => {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(512, y); ctx.stroke();
        });
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
        return texture;
    }

    function createFirework(x, y, z) {
        const particles = new THREE.Group();
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        for (let i = 0; i < 40; i++) {
            const p = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), new THREE.MeshBasicMaterial({ color }));
            p.userData.velocity = new THREE.Vector3((Math.random()-0.5)*0.4, (Math.random()-0.2)*0.5, (Math.random()-0.5)*0.4);
            particles.add(p);
        }
        particles.position.set(x, y, z);
        scene.add(particles);
        fireworks.push({ group: particles, life: 1.0, update() {
            this.life -= 0.015;
            this.group.children.forEach(p => {
                p.position.add(p.userData.velocity);
                p.userData.velocity.y -= 0.005;
                p.scale.multiplyScalar(0.98);
            });
            if (this.life <= 0) { scene.remove(this.group); return false; }
            return true;
        }});
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0502);
        camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 26, 28); camera.lookAt(0, 0, 4);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffe0b2, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 25, 10); dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(4096, 4096);
        dirLight.shadow.camera.left = -15; dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 20; dirLight.shadow.camera.bottom = -20;
        scene.add(dirLight);

        const slopeGroup = new THREE.Group();
        slopeGroup.rotation.x = 0.015; scene.add(slopeGroup);

        const board = new THREE.Mesh(new THREE.BoxGeometry(worldWidth, 0.5, worldDepth), new THREE.MeshPhongMaterial({ map: createWoodTexture(), shininess: 80, specular: 0x444444 }));
        board.position.y = -0.25; board.receiveShadow = true; slopeGroup.add(board);

        const gutters = [-(worldWidth/2 + 0.5), (worldWidth/2 + 0.5)];
        gutters.forEach(x => {
            const side = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, worldDepth), new THREE.MeshPhongMaterial({ color: 0x111111 }));
            side.position.set(x, -0.15, 0); side.receiveShadow = true; slopeGroup.add(side);
        });

        const farWall = new THREE.Mesh(new THREE.BoxGeometry(worldWidth+2, 2.5, 0.5), new THREE.MeshPhongMaterial({ color: 0x1a110a }));
        farWall.position.set(0, 1, -(worldDepth/2 + 0.25)); farWall.castShadow = farWall.receiveShadow = true;
        slopeGroup.add(farWall);

        const line = new THREE.Mesh(new THREE.BoxGeometry(worldWidth, 0.05, 0.2), new THREE.MeshBasicMaterial({ color: 0xff3333 }));
        line.position.set(0, 0.03, deadLineZ); slopeGroup.add(line);

        scene.slopeGroup = slopeGroup;
        spawnShooter();

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onRelease);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); isMouseDown = true; }, {passive: false});
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('touchend', onRelease);

        animate();
    }

    function createCube(value, x, z, y = cubeSize/2) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const color = getColorForValue(value);
        ctx.fillStyle = '#' + color.toString(16).padStart(6, '0'); ctx.fillRect(0, 0, 256, 256);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 24; ctx.strokeRect(0, 0, 256, 256);
        ctx.fillStyle = (value === 1024 || value === 8 || value === 4 || color === 0xf1f2f6) ? '#000' : '#fff';
        ctx.font = '900 130px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 8; ctx.fillText(value, 128, 128);
        const cube = new THREE.Mesh(new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize), new THREE.MeshPhongMaterial({ map: new THREE.CanvasTexture(canvas), shininess: 50 }));
        cube.castShadow = cube.receiveShadow = true; cube.position.set(x, y, z);
        cube.userData = { value, isMoving: false, velocity: new THREE.Vector3(), angularVelocity: new THREE.Vector3() };
        return cube;
    }

    function createPopRing(pos, color) {
        const ring = new THREE.Mesh(new THREE.TorusGeometry(cubeSize*0.6, 0.08, 12, 32), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 }));
        ring.position.copy(pos); ring.rotation.x = Math.PI/2; scene.slopeGroup.add(ring);
        effects.push({ mesh: ring, life: 1.0, update() {
            this.life -= 0.04; this.mesh.scale.addScalar(0.25); this.mesh.material.opacity = this.life;
            if (this.life <= 0) { scene.slopeGroup.remove(this.mesh); return false; } return true;
        }});
    }

    function spawnShooter() {
        if (isGameOver || activeCube) return;
        activeCube = createCube([2, 4, 8, 16, 32][Math.floor(Math.random()*5)], 0, worldDepth/2 - 1.5);
        scene.slopeGroup.add(activeCube);
    }

    function onMove(e) {
        if (!activeCube || activeCube.userData.isMoving) return;
        const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        const x = ((clientX / window.innerWidth) * 2 - 1) * (worldWidth / 2);
        activeCube.position.x = Math.max(-worldWidth/2 + 0.6, Math.min(worldWidth/2 - 0.6, x));
    }

    function onRelease() {
        if (!isMouseDown || !activeCube) return;
        isMouseDown = false; activeCube.userData.isMoving = true; activeCube.userData.velocity.z = -1.2;
        cubes.push(activeCube); activeCube = null;
    }

    function animate() {
        requestAnimationFrame(animate);
        let boardIsActive = false;
        effects = effects.filter(eff => eff.update());
        fireworks = fireworks.filter(fw => fw.update());
        if (isGameOver) { renderer.render(scene, camera); return; }

        for (let i = cubes.length - 1; i >= 0; i--) {
            const cube = cubes[i]; if (!cube.parent) continue;
            resolveSolidOverlap(cube);
            const support = checkSupport(cube);
            if (!support && cube.position.y > cubeSize/2) { cube.userData.velocity.y -= verticalGravity; boardIsActive = true; }
            else if (support && cube.userData.velocity.y < 0) { cube.userData.velocity.y = 0; cube.position.y = support.position.y + cubeSize; }
            else if (cube.position.y <= cubeSize/2) { cube.position.y = cubeSize/2; if (cube.userData.velocity.y < 0) cube.userData.velocity.y = 0; }

            if (cube.userData.angularVelocity.length() > 0.001) {
                cube.rotation.x += cube.userData.angularVelocity.x; cube.rotation.y += cube.userData.angularVelocity.y;
                cube.rotation.z += cube.userData.angularVelocity.z; cube.userData.angularVelocity.multiplyScalar(0.96);
                boardIsActive = true;
            }

            const speed = cube.userData.velocity.length();
            if (cube.userData.isMoving || speed > 0.01) {
                boardIsActive = true; cube.userData.velocity.z -= slopeGravity; cube.position.add(cube.userData.velocity);
                resolveSolidOverlap(cube);
                cube.userData.velocity.multiplyScalar(0.97);
                if (speed < 0.02 && cube.position.y <= cubeSize/2 + 0.02) { stopCube(cube); }
                if (cube.position.z < -worldDepth/2 + 0.5) { cube.position.z = -worldDepth/2 + 0.5; cube.userData.velocity.z = 0; }
                if (cube.position.z > worldDepth/2 + 1.2) endGame("FELL OFF THE BACK!");
                if (cube.position.z > deadLineZ + 0.2 && speed < 0.05 && cube.position.y <= cubeSize/2 + 0.05) endGame("CROSSED THE LINE!");
                if (Math.abs(cube.position.x) > worldWidth/2 - 0.5) { cube.position.x = Math.sign(cube.position.x) * (worldWidth/2 - 0.5); cube.userData.velocity.x *= -0.5; }
                for (let other of cubes) {
                    if (other === cube || !other.parent) continue;
                    const threshold = (cube.userData.value === other.userData.value) ? cubeSize * 1.15 : cubeSize * 0.98;
                    if (cube.position.distanceTo(other.position) < threshold) { handleCollision(cube, other); break; }
                }
            }
        }
        if (!boardIsActive && !activeCube && !isGameOver && effects.length === 0) spawnShooter();
        renderer.render(scene, camera);
    }

    function checkSupport(cube) {
        for (let other of cubes) {
            if (other === cube || !other.parent) continue;
            const xOverlap = cubeSize - Math.abs(cube.position.x - other.position.x);
            const zOverlap = cubeSize - Math.abs(cube.position.z - other.position.z);
            const yDelta = cube.position.y - (other.position.y + cubeSize);
            if (xOverlap > cubeSize * supportOverlapThreshold && zOverlap > cubeSize * supportOverlapThreshold && yDelta > -0.25 && yDelta < 0.45) return other;
        }
        return null;
    }

    function resolveSolidOverlap(cube) {
        for (let other of cubes) {
            if (other === cube || !other.parent) continue;
            const dx = cube.position.x - other.position.x;
            const dy = cube.position.y - other.position.y;
            const dz = cube.position.z - other.position.z;
            const overlapX = cubeSize - Math.abs(dx);
            const overlapY = cubeSize - Math.abs(dy);
            const overlapZ = cubeSize - Math.abs(dz);
            if (overlapX <= 0 || overlapY <= 0 || overlapZ <= 0) continue;

            if (overlapY <= overlapX && overlapY <= overlapZ) {
                const dirY = dy >= 0 ? 1 : -1;
                cube.position.y += dirY * (overlapY + overlapEpsilon);
                if ((dirY > 0 && cube.userData.velocity.y < 0) || (dirY < 0 && cube.userData.velocity.y > 0)) cube.userData.velocity.y = 0;
            } else if (overlapX <= overlapZ) {
                const dirX = dx >= 0 ? 1 : -1;
                cube.position.x += dirX * (overlapX + overlapEpsilon);
                cube.userData.velocity.x += dirX * overlapHorizontalNudge;
            } else {
                const dirZ = dz >= 0 ? 1 : -1;
                cube.position.z += dirZ * (overlapZ + overlapEpsilon);
                cube.userData.velocity.z += dirZ * overlapHorizontalNudge;
            }
        }
    }

    function handleCollision(moving, other) {
        if (moving.userData.value === other.userData.value) performMerge(moving, other);
        else {
            const collisionVec = new THREE.Vector3().subVectors(other.position, moving.position).normalize();
            const relVel = moving.userData.velocity.length();
            other.userData.velocity.add(collisionVec.clone().multiplyScalar(relVel * 0.75));
            const bounceVec = new THREE.Vector3().subVectors(moving.position, other.position).normalize();
            moving.userData.velocity.copy(bounceVec.multiplyScalar(relVel * 0.25));
            const minMove = (cubeSize - moving.position.distanceTo(other.position)) / 2;
            moving.position.add(bounceVec.multiplyScalar(minMove)); other.position.add(collisionVec.multiplyScalar(minMove));
        }
    }

    function performMerge(target, source) {
        const val = target.userData.value * 2; score += val; document.getElementById('score').innerText = score;
        const pos = source.position.clone(); createPopRing(pos, getColorForValue(val));
        scene.slopeGroup.remove(source); scene.slopeGroup.remove(target);
        cubes = cubes.filter(c => c !== source && c !== target);
        const upgraded = createCube(val, pos.x, pos.z, pos.y); scene.slopeGroup.add(upgraded);
        upgraded.userData.velocity.set((Math.random()-0.5)*0.3, 0.8, -1.1);
        upgraded.userData.angularVelocity.set((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5);
        cubes.push(upgraded); upgraded.scale.set(2.4, 2.4, 2.4);
        let spring = 0.1; const shrink = setInterval(() => {
            if (!upgraded.parent) { clearInterval(shrink); return; }
            upgraded.scale.lerp(new THREE.Vector3(1,1,1), spring); spring += 0.015;
            if (upgraded.scale.x <= 1.05) { upgraded.scale.set(1,1,1); clearInterval(shrink); }
        }, 16);
        if (val === 2048) triggerWin();
    }

    function triggerWin() {
        document.getElementById('win-screen').style.display = 'block'; document.getElementById('final-score-win').innerText = score;
        for (let i = 0; i < 10; i++) setTimeout(() => createFirework((Math.random()-0.5)*worldWidth, 5+Math.random()*5, (Math.random()-0.5)*worldDepth), i*400);
    }

    function stopCube(c) { c.userData.isMoving = false; c.userData.velocity.set(0,0,0); c.userData.angularVelocity.set(0,0,0); c.rotation.set(0,0,0); }
    function endGame(r) { if (isGameOver) return; isGameOver = true; document.getElementById('game-over').style.display = 'block'; document.getElementById('game-over-reason').innerText = r; document.getElementById('final-score-over').innerText = score; }
    function onWindowResize() { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    init();
</script>
</body>
</html>
